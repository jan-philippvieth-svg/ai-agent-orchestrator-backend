services:
  orchestrator:
    build: .
    container_name: ai-agent-orchestrator-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      STUB_EXTERNAL_SERVICES: "false"
      QDRANT_URL: http://qdrant:6333
      CHAT_CACHE_ENABLED: "true"
      ADMIN_PRIVATE_NETWORKS_ONLY: "true"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||3001; const key=process.env.API_KEY||'dev-secret'; fetch(`http://127.0.0.1:${port}/health`,{headers:{'x-api-key':key}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-agent-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: ai-agent-caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      orchestrator:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  qdrant_data:
  caddy_data:
  caddy_config:
