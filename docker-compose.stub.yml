services:
  orchestrator:
    build: .
    container_name: ai-agent-orchestrator-backend-stub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      API_KEY: dev-secret
      STUB_EXTERNAL_SERVICES: "true"
      CHAT_CACHE_ENABLED: "true"
      ADMIN_PRIVATE_NETWORKS_ONLY: "true"
      ADMIN_ALLOWED_IPS: 127.0.0.1,::1
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||3001; const key=process.env.API_KEY||'dev-secret'; fetch(`http://127.0.0.1:${port}/health`,{headers:{'x-api-key':key}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
